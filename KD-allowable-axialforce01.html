<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦材・斜材 許容軸力計算アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .card {
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .table-custom {
            width: 100%;
            border-collapse: collapse;
        }
        .table-custom th, .table-custom td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }
        .table-custom th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        .table-custom tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }
        .formula-box {
            background-color: #f3f4f6;
            border-left: 4px solid #4f46e5;
            padding: 1rem;
            margin-top: 0.5rem;
            border-radius: 0.25rem;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox {
            height: 1.25rem;
            width: 1.25rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">弦材・斜材 許容軸力計算アプリ</h1>
            <p class="text-gray-600 mt-1">参考資料の計算方法に基づき、許容軸力を計算します。</p>
        </header>

        <div class="card">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="factor-select" class="block text-lg font-medium text-gray-700">許容応力度割増係数</label>
                    <select id="factor-select" class="mt-2 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                        <option value="1.00">1.00 (長期)</option>
                        <option value="1.25">1.25</option>
                        <option value="1.50" selected>1.50 (短期)</option>
                    </select>
                </div>
                <div>
                     <label class="block text-lg font-medium text-gray-700">オプション</label>
                     <div class="mt-2 space-y-2">
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-special-reinforcement" class="checkbox">
                            <span>特殊弦材補強を使用 (E3V特)</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-special-splice-plate" class="checkbox">
                            <span>特殊添接板を使用 (E3V特)</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-kmt3t-diagonal" class="checkbox">
                            <span>斜材 (KMT-3T) を使用</span>
                        </label>
                     </div>
                </div>
            </div>
        </div>

        <div id="results-container">
            <!-- 結果はここに動的に挿入されます -->
        </div>
    </div>

    <script>
        const factorSelect = document.getElementById('factor-select');
        const useSpecialReinforcementCheck = document.getElementById('use-special-reinforcement');
        const useSpecialSplicePlateCheck = document.getElementById('use-special-splice-plate');
        const useKmt3tDiagonalCheck = document.getElementById('use-kmt3t-diagonal');

        function calculateAndDisplay() {
            const factor = parseFloat(factorSelect.value);
            const useSpecialReinforcement = useSpecialReinforcementCheck.checked;
            const useSpecialSplicePlate = useSpecialSplicePlateCheck.checked;
            const useKmt3tDiagonal = useKmt3tDiagonalCheck.checked;
            const isSpecialE3V = useSpecialReinforcement || useSpecialSplicePlate;
            
            const hokyo1Label = useSpecialReinforcement ? '1(標準)' : '';
            const tenseiban1Label = useSpecialSplicePlate ? '1(標準)' : '';

            // --- 基礎値の計算 ---
            const constants = {
                // 弦材 (H-200x200x8x12)
                gentai: { An: 4899, A: 6353, sigma_ca_base: 0.143 },
                // 弦材補強1 (標準, 2-CT-100x200x8x12)
                gentaiHokyo1: { An: 2450, A: 3177, sigma_ca_base: 0.139 },
                // 弦材補強2 (特殊, 2-CT-100x200x12x12)
                gentaiHokyo2: { An: 2729, A: 3456, sigma_ca_base: 0.150 },
                // 斜材 (H-200x150x8x9)
                shazai: { A: 4156, sigma_ca_base: 0.133 },
                // 斜材 (KMT-3T, H-200x150x9x12)
                shazai_kmt3t: { A: 5184, sigma_ca_base: 0.136 },
                // 添接板1 (標準, 2-PL-200x16)
                tenseiban1: { An: 4461 },
                // 添接板2 (特殊, 2-PL-210x16)
                tenseiban2: { An: 4781 },
                // 添接部ボルト (B10T d=30.0)
                bolt: { d: 30.0, t_min: 12.0, n: 8 }
            };

            const baseForces = {};
            // 弦材
            baseForces.gentai_Nta = 0.210 * constants.gentai.An * factor;
            baseForces.gentai_Nca = constants.gentai.sigma_ca_base * constants.gentai.A * factor;
            // 弦材補強1 (標準)
            baseForces.gentaiHokyo1_Nta = 0.210 * constants.gentaiHokyo1.An * 2 * factor;
            baseForces.gentaiHokyo1_Nca = constants.gentaiHokyo1.sigma_ca_base * constants.gentaiHokyo1.A * 2 * factor;
            // 弦材補強2 (特殊)
            baseForces.gentaiHokyo2_Nta = 0.210 * constants.gentaiHokyo2.An * 2 * factor;
            baseForces.gentaiHokyo2_Nca = constants.gentaiHokyo2.sigma_ca_base * constants.gentaiHokyo2.A * 2 * factor;
            // 斜材 (標準)
            baseForces.shazai_Nta = 0.210 * constants.shazai.A * factor;
            baseForces.shazai_Nca = constants.shazai.sigma_ca_base * constants.shazai.A * factor;
            // 斜材 (KMT-3T)
            baseForces.shazai_kmt3t_Nta = 0.210 * constants.shazai_kmt3t.A * factor;
            baseForces.shazai_kmt3t_Nca = constants.shazai_kmt3t.sigma_ca_base * constants.shazai_kmt3t.A * factor;
            // 添接板1 (標準)
            baseForces.tenseiban1_NBt = 0.210 * constants.tenseiban1.An * factor;
            // 添接板2 (特殊)
            baseForces.tenseiban2_NBt = 0.210 * constants.tenseiban2.An * factor;
            // 添接部ボルト許容力
            const sigma_pa = 355 * factor;
            const Rp = constants.bolt.d * constants.bolt.t_min * sigma_pa;
            const Sa = Rp / 1000;
            baseForces.tenseiban_Nca = constants.bolt.n * Sa;
            
            // --- 弦材タイプ別許容軸力の計算 ---
            const chordTable = {};
            chordTable.E1 = { tension: baseForces.tenseiban1_NBt * 1, compression: baseForces.gentai_Nca * 1 };
            chordTable.E1V = { tension: baseForces.tenseiban1_NBt * 2, compression: baseForces.gentaiHokyo1_Nca * 2 };
            chordTable.E2 = { tension: baseForces.tenseiban1_NBt * 2, compression: baseForces.gentai_Nca * 2 };
            chordTable.E3 = { tension: baseForces.tenseiban1_NBt * 3, compression: baseForces.gentai_Nca * 3 };
            chordTable.E3V = { tension: baseForces.tenseiban1_NBt * 4, compression: baseForces.gentaiHokyo1_Nca * 4 };

            let e3vSpecialResult = null;
            if (isSpecialE3V) {
                // E3V特
                const tensionCandidates = [baseForces.gentai_Nta];
                const compressionCandidates = [baseForces.gentai_Nca, baseForces.tenseiban_Nca];
                
                if(useSpecialReinforcement) {
                    tensionCandidates.push(baseForces.gentaiHokyo2_Nta);
                    compressionCandidates.push(baseForces.gentaiHokyo2_Nca);
                } else {
                    tensionCandidates.push(baseForces.gentaiHokyo1_Nta);
                    compressionCandidates.push(baseForces.gentaiHokyo1_Nca);
                }
                
                if(useSpecialSplicePlate) {
                    tensionCandidates.push(baseForces.tenseiban2_NBt);
                } else {
                    tensionCandidates.push(baseForces.tenseiban1_NBt);
                }
                
                const minTension = Math.min(...tensionCandidates);
                const minCompression = Math.min(...compressionCandidates);
                
                let tensionExplanationText = '';
                if (minTension === baseForces.gentai_Nta) tensionExplanationText = '弦材の許容引張力';
                else if (minTension === baseForces.gentaiHokyo1_Nta) tensionExplanationText = `弦材補強${hokyo1Label}の許容引張力`;
                else if (minTension === baseForces.gentaiHokyo2_Nta) tensionExplanationText = '弦材補強2(特殊)の許容引張力';
                else if (minTension === baseForces.tenseiban1_NBt) tensionExplanationText = `添接板${tenseiban1Label}の許容引張力`;
                else if (minTension === baseForces.tenseiban2_NBt) tensionExplanationText = '添接板2(特殊)の許容引張力';

                let compressionExplanationText = '';
                if (minCompression === baseForces.gentai_Nca) compressionExplanationText = '弦材の許容圧縮力';
                else if (minCompression === baseForces.tenseiban_Nca) compressionExplanationText = '添接板の許容圧縮力';
                else if (minCompression === baseForces.gentaiHokyo1_Nca) compressionExplanationText = `弦材補強${hokyo1Label}の許容圧縮力`;
                else if (minCompression === baseForces.gentaiHokyo2_Nca) compressionExplanationText = '弦材補強2(特殊)の許容圧縮力';
                
                e3vSpecialResult = {
                    tension: minTension * 4,
                    compression: minCompression * 4,
                    minTension: minTension,
                    minCompression: minCompression,
                    tensionExplanation: tensionExplanationText,
                    compressionExplanation: compressionExplanationText
                };
            }

            // --- 斜材タイプ別許容軸力の計算 ---
            const diagonalTable = {};
            diagonalTable.E1 = { tension: baseForces.shazai_Nta * 1, compression: baseForces.shazai_Nca * 1 };
            diagonalTable.E2 = { tension: baseForces.shazai_Nta * 2, compression: baseForces.shazai_Nca * 2 };
            
            let diagonalKmt3tTable = null;
            if (useKmt3tDiagonal) {
                 diagonalKmt3tTable = {};
                 diagonalKmt3tTable.E1 = { tension: baseForces.shazai_kmt3t_Nta * 1, compression: baseForces.shazai_kmt3t_Nca * 1 };
                 diagonalKmt3tTable.E2 = { tension: baseForces.shazai_kmt3t_Nta * 2, compression: baseForces.shazai_kmt3t_Nca * 2 };
            }
            
            // --- HTMLの生成と表示 ---
            displayResults(chordTable, diagonalTable, diagonalKmt3tTable, baseForces, e3vSpecialResult, isSpecialE3V, useKmt3tDiagonal);
        }
        
        function displayResults(chordTable, diagonalTable, diagonalKmt3tTable, baseForces, e3vSpecialResult, isSpecialE3V, useKmt3tDiagonal) {
             const resultsContainer = document.getElementById('results-container');
             const useSpecialReinforcement = useSpecialReinforcementCheck.checked;
             const useSpecialSplicePlate = useSpecialSplicePlateCheck.checked;
             const hokyo1Label = useSpecialReinforcement ? '1(標準)' : '';
             const tenseiban1Label = useSpecialSplicePlate ? '1(標準)' : '';

            let e3vSpecialRow = '';
            if (isSpecialE3V) {
                const reinforcementPart = useSpecialReinforcement ? "2-CT-100x200x12x12" : "2-CT-100x200x8x12";
                const e3vSpecialCrossSection = `3-H-200x200x8x12 + ${reinforcementPart}`;
                e3vSpecialRow = `
                    <tr class="bg-indigo-50">
                        <td class="font-bold">E3V特</td>
                        <td>${e3vSpecialCrossSection}</td>
                        <td>SM490Y</td>
                        <td class="font-bold">${e3vSpecialResult.tension.toFixed(1)}</td>
                        <td class="font-bold">${e3vSpecialResult.compression.toFixed(1)}</td>
                    </tr>
                `;
            }

            const baseValuesLines = [];
            baseValuesLines.push(`・弦材 許容引張力 (Nta) = ${baseForces.gentai_Nta.toFixed(1)} kN`);
            baseValuesLines.push(`・弦材 許容圧縮力 (Nca) = ${baseForces.gentai_Nca.toFixed(1)} kN`);
            baseValuesLines.push(`・弦材補強${hokyo1Label} 許容引張力 (Nta) = ${baseForces.gentaiHokyo1_Nta.toFixed(1)} kN`);
            baseValuesLines.push(`・弦材補強${hokyo1Label} 許容圧縮力 (Nca) = ${baseForces.gentaiHokyo1_Nca.toFixed(1)} kN`);
            
            if (useSpecialReinforcement) {
                baseValuesLines.push(`・弦材補強2(特殊) 許容引張力 (Nta) = ${baseForces.gentaiHokyo2_Nta.toFixed(1)} kN`);
                baseValuesLines.push(`・弦材補強2(特殊) 許容圧縮力 (Nca) = ${baseForces.gentaiHokyo2_Nca.toFixed(1)} kN`);
            }
            
            baseValuesLines.push(`・添接板${tenseiban1Label} 許容引張力 (NBt) = ${baseForces.tenseiban1_NBt.toFixed(1)} kN`);

            if (useSpecialSplicePlate) {
                baseValuesLines.push(`・添接板2(特殊) 許容引張力 (NBt) = ${baseForces.tenseiban2_NBt.toFixed(1)} kN`);
            }
            
            baseValuesLines.push(`・添接板 許容圧縮力 (Nca) = ${baseForces.tenseiban_Nca.toFixed(1)} kN`);
            baseValuesLines.push(`・斜材 (標準) 許容引張力 (Nta) = ${baseForces.shazai_Nta.toFixed(1)} kN`);
            baseValuesLines.push(`・斜材 (標準) 許容圧縮力 (Nca) = ${baseForces.shazai_Nca.toFixed(1)} kN`);
            
            if (useKmt3tDiagonal) {
                 baseValuesLines.push(`・斜材(KMT-3T) 許容引張力 (Nta) = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} kN`);
                 baseValuesLines.push(`・斜材(KMT-3T) 許容圧縮力 (Nca) = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} kN`);
            }

            const baseValuesHtml = `<div class="formula-box">${baseValuesLines.join('<br>')}</div>`;

            let chordFormulasHtml = `
                <div class="formula-box">
                    E1  引張: 添接板${tenseiban1Label}の許容引張力×1 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 1 = ${chordTable.E1.tension.toFixed(1)} kN<br>
                    E1  圧縮: 弦材の許容圧縮力×1 = ${baseForces.gentai_Nca.toFixed(1)} × 1 = ${chordTable.E1.compression.toFixed(1)} kN<br><br>
                    E1V 引張: 添接板${tenseiban1Label}の許容引張力×2 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 2 = ${chordTable.E1V.tension.toFixed(1)} kN<br>
                    E1V 圧縮: 弦材補強${hokyo1Label}の許容圧縮力×2 = ${baseForces.gentaiHokyo1_Nca.toFixed(1)} × 2 = ${chordTable.E1V.compression.toFixed(1)} kN<br><br>
                    E2  引張: 添接板${tenseiban1Label}の許容引張力×2 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 2 = ${chordTable.E2.tension.toFixed(1)} kN<br>
                    E2  圧縮: 弦材の許容圧縮力×2 = ${baseForces.gentai_Nca.toFixed(1)} × 2 = ${chordTable.E2.compression.toFixed(1)} kN<br><br>
                    E3  引張: 添接板${tenseiban1Label}の許容引張力×3 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 3 = ${chordTable.E3.tension.toFixed(1)} kN<br>
                    E3  圧縮: 弦材の許容圧縮力×3 = ${baseForces.gentai_Nca.toFixed(1)} × 3 = ${chordTable.E3.compression.toFixed(1)} kN<br><br>
                    E3V 引張: 添接板${tenseiban1Label}の許容引張力×4 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 4 = ${chordTable.E3V.tension.toFixed(1)} kN<br>
                    E3V 圧縮: 弦材補強${hokyo1Label}の許容圧縮力×4 = ${baseForces.gentaiHokyo1_Nca.toFixed(1)} × 4 = ${chordTable.E3V.compression.toFixed(1)} kN
                    ${isSpecialE3V ? `
                        <br><br><hr class="my-2 border-gray-400"><br>
                        <b>E3V特 引張:</b> ${e3vSpecialResult.tensionExplanation}×4 = ${e3vSpecialResult.minTension.toFixed(1)} × 4 = <b>${e3vSpecialResult.tension.toFixed(1)} kN</b><br>
                        <b>E3V特 圧縮:</b> ${e3vSpecialResult.compressionExplanation}×4 = ${e3vSpecialResult.minCompression.toFixed(1)} × 4 = <b>${e3vSpecialResult.compression.toFixed(1)} kN</b>`
                     : ''}
                </div>`;

            let kmt3tRows = '';
            if(useKmt3tDiagonal) {
                kmt3tRows = `
                    <tr class="bg-green-50"><td>E1 (KMT-3T)</td><td>1-H-200x150x9x12</td><td>SM490Y</td><td>${diagonalKmt3tTable.E1.tension.toFixed(1)}</td><td>${diagonalKmt3tTable.E1.compression.toFixed(1)}</td></tr>
                    <tr class="bg-green-50"><td>E2 (KMT-3T)</td><td>2-H-200x150x9x12</td><td>SM490Y</td><td>${diagonalKmt3tTable.E2.tension.toFixed(1)}</td><td>${diagonalKmt3tTable.E2.compression.toFixed(1)}</td></tr>
                `;
            }

            let shazaiFormulaHtml = `
                <div class="formula-box">
                    E1  引張: 斜材(標準)の許容引張力×1 = ${baseForces.shazai_Nta.toFixed(1)} × 1 = ${diagonalTable.E1.tension.toFixed(1)} kN<br>
                    E1  圧縮: 斜材(標準)の許容圧縮力×1 = ${baseForces.shazai_Nca.toFixed(1)} × 1 = ${diagonalTable.E1.compression.toFixed(1)} kN<br><br>
                    E2  引張: 斜材(標準)の許容引張力×2 = ${baseForces.shazai_Nta.toFixed(1)} × 2 = ${diagonalTable.E2.tension.toFixed(1)} kN<br>
                    E2  圧縮: 斜材(標準)の許容圧縮力×2 = ${baseForces.shazai_Nca.toFixed(1)} × 2 = ${diagonalTable.E2.compression.toFixed(1)} kN
                    ${useKmt3tDiagonal ? `
                        <br><br><hr class="my-2 border-gray-400"><br>
                        <b>E1(KMT-3T) 引張:</b> 斜材(KMT-3T)の許容引張力×1 = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} × 1 = <b>${diagonalKmt3tTable.E1.tension.toFixed(1)} kN</b><br>
                        <b>E1(KMT-3T) 圧縮:</b> 斜材(KMT-3T)の許容圧縮力×1 = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} × 1 = <b>${diagonalKmt3tTable.E1.compression.toFixed(1)} kN</b><br><br>
                        <b>E2(KMT-3T) 引張:</b> 斜材(KMT-3T)の許容引張力×2 = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} × 2 = <b>${diagonalKmt3tTable.E2.tension.toFixed(1)} kN</b><br>
                        <b>E2(KMT-3T) 圧縮:</b> 斜材(KMT-3T)の許容圧縮力×2 = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} × 2 = <b>${diagonalKmt3tTable.E2.compression.toFixed(1)} kN</b>`
                    : ''}
                </div>
            `;
            
            resultsContainer.innerHTML = `
                <div class="card">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4">弦材許容軸力表 (単位: kN)</h2>
                    <div class="overflow-x-auto">
                        <table class="table-custom">
                            <thead><tr><th>弦材タイプ</th><th>断面</th><th>材質</th><th>許容引張力</th><th>許容圧縮力</th></tr></thead>
                            <tbody>
                                <tr><td>E1</td><td>1-H-200x200x8x12</td><td>SM490Y</td><td>${chordTable.E1.tension.toFixed(1)}</td><td>${chordTable.E1.compression.toFixed(1)}</td></tr>
                                <tr><td>E1V</td><td>1-H-200x200x8x12 + 2-CT-100x200x8x12</td><td>SM490Y</td><td>${chordTable.E1V.tension.toFixed(1)}</td><td>${chordTable.E1V.compression.toFixed(1)}</td></tr>
                                <tr><td>E2</td><td>2-H-200x200x8x12</td><td>SM490Y</td><td>${chordTable.E2.tension.toFixed(1)}</td><td>${chordTable.E2.compression.toFixed(1)}</td></tr>
                                <tr><td>E3</td><td>3-H-200x200x8x12</td><td>SM490Y</td><td>${chordTable.E3.tension.toFixed(1)}</td><td>${chordTable.E3.compression.toFixed(1)}</td></tr>
                                <tr><td>E3V</td><td>3-H-200x200x8x12 + 2-CT-100x200x8x12</td><td>SM490Y</td><td>${chordTable.E3V.tension.toFixed(1)}</td><td>${chordTable.E3V.compression.toFixed(1)}</td></tr>
                                ${e3vSpecialRow}
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4">斜材許容軸力表 (単位: kN)</h2>
                    <div class="overflow-x-auto">
                        <table class="table-custom">
                             <thead><tr><th>斜材タイプ</th><th>断面</th><th>材質</th><th>許容引張力</th><th>許容圧縮力</th></tr></thead>
                             <tbody>
