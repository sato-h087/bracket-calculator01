<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弦材・斜材 許容軸力計算アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .card {
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .table-custom {
            width: 100%;
            border-collapse: collapse;
        }
        .table-custom th, .table-custom td {
            border: 1px solid #e5e7eb;
            padding: 0.75rem;
            text-align: left;
        }
        .table-custom th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        .table-custom tbody tr:nth-child(even) {
            background-color: #f9fafb;
        }
        .formula-box {
            background-color: #f3f4f6;
            border-left: 4px solid #4f46e5;
            padding: 1rem;
            margin-top: 0.5rem;
            border-radius: 0.25rem;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox {
            height: 1.25rem;
            width: 1.25rem;
            border-radius: 0.25rem;
            border: 1px solid #d1d5db;
            margin-right: 0.5rem;
        }
        .input-custom {
             margin-top: 0.25rem;
             display: block;
             width: 100%;
             border-color: #d1d5db;
             border-radius: 0.375rem;
             box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .input-custom:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 1px #4f46e5;
        }

    </style>
</head>
<body class="bg-gray-100 p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">弦材・斜材 許容軸力計算アプリ</h1>
            <p class="text-gray-600 mt-1">参考資料の計算方法に基づき、許容軸力を計算します。</p>
        </header>

        <div class="card">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-8">
                <div>
                    <label for="factor-select" class="block text-lg font-medium text-gray-700">許容応力度割増係数</label>
                    <select id="factor-select" class="mt-2 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md">
                        <option value="1.00">1.00 (長期)</option>
                        <option value="1.25">1.25</option>
                        <option value="1.50" selected>1.50 (短期)</option>
                    </select>
                </div>
                <div>
                     <label class="block text-lg font-medium text-gray-700">オプション</label>
                     <div class="mt-2 space-y-2">
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-special-reinforcement" class="checkbox">
                            <span>特殊弦材補強を使用 (E3V特)</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-special-splice-plate" class="checkbox">
                            <span>特殊添接板を使用 (E3V特)</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="use-kmt3t-diagonal" class="checkbox">
                            <span>斜材 (KMT-3T) を使用</span>
                        </label>
                     </div>
                </div>
                <div class="md:col-span-2">
                    <h3 class="text-lg font-medium text-gray-700 mb-2">有効座屈長 (m)</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label for="lk-gentai" class="block text-sm font-medium text-gray-600">弦材</label>
                            <input type="number" id="lk-gentai" value="3.0" step="0.1" class="input-custom">
                        </div>
                        <div>
                            <label for="lk-hokyo1" class="block text-sm font-medium text-gray-600">弦材補強 (標準)</label>
                            <input type="number" id="lk-hokyo1" value="1.5" step="0.1" class="input-custom">
                        </div>
                        <div>
                            <label for="lk-hokyo2" class="block text-sm font-medium text-gray-600">弦材補強 (特殊)</label>
                            <input type="number" id="lk-hokyo2" value="1.5" step="0.1" class="input-custom">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="results-container">
            <!-- 結果はここに動的に挿入されます -->
        </div>
    </div>

    <script>
        const factorSelect = document.getElementById('factor-select');
        const useSpecialReinforcementCheck = document.getElementById('use-special-reinforcement');
        const useSpecialSplicePlateCheck = document.getElementById('use-special-splice-plate');
        const useKmt3tDiagonalCheck = document.getElementById('use-kmt3t-diagonal');
        const lkGentaiInput = document.getElementById('lk-gentai');
        const lkHokyo1Input = document.getElementById('lk-hokyo1');
        const lkHokyo2Input = document.getElementById('lk-hokyo2');

        function getSigmaCa(lambda) {
            if (lambda <= 15) return 210.0;
            const sigma = 210.0 - 1.5 * (lambda - 15);
            return Math.max(0, sigma); // 負の値を返さない
        }

        function calculateAndDisplay() {
            const factor = parseFloat(factorSelect.value);
            const useSpecialReinforcement = useSpecialReinforcementCheck.checked;
            const useSpecialSplicePlate = useSpecialSplicePlateCheck.checked;
            const useKmt3tDiagonal = useKmt3tDiagonalCheck.checked;
            const isSpecialE3V = useSpecialReinforcement || useSpecialSplicePlate;
            const lk_gentai_m = parseFloat(lkGentaiInput.value);
            const lk_hokyo1_m = parseFloat(lkHokyo1Input.value);
            const lk_hokyo2_m = parseFloat(lkHokyo2Input.value);
            
            const hokyo1Label = useSpecialReinforcement ? '1(標準)' : '';
            const tenseiban1Label = useSpecialSplicePlate ? '1(標準)' : '';

            const constants = {
                gentai: { An: 4899, A: 6353, iy_cm: 5.02 },
                gentaiHokyo1: { An: 2450, A: 3177, ix_cm: 2.41 },
                gentaiHokyo2: { An: 2729, A: 3456, ix_cm: 2.71 },
                shazai: { A: 4156, sigma_ca_base: 0.133 },
                shazai_kmt3t: { A: 5184, sigma_ca_base: 0.136 },
                tenseiban1: { An: 4461 },
                tenseiban2: { An: 4781 },
                bolt: { d: 30.0, t_min: 12.0, n: 8 }
            };

            const baseForces = {};
            
            baseForces.gentai_Nta = 0.210 * constants.gentai.An * factor;
            baseForces.gentaiHokyo1_Nta = 0.210 * constants.gentaiHokyo1.An * 2 * factor;
            baseForces.gentaiHokyo2_Nta = 0.210 * constants.gentaiHokyo2.An * 2 * factor;
            baseForces.shazai_Nta = 0.210 * constants.shazai.A * factor;
            baseForces.shazai_kmt3t_Nta = 0.210 * constants.shazai_kmt3t.A * factor;
            baseForces.tenseiban1_NBt = 0.210 * constants.tenseiban1.An * factor;
            baseForces.tenseiban2_NBt = 0.210 * constants.tenseiban2.An * factor;

            const lambda_gentai = (lk_gentai_m * 100) / constants.gentai.iy_cm;
            const sigma_ca_gentai = getSigmaCa(lambda_gentai);
            baseForces.gentai_Nca = (sigma_ca_gentai * constants.gentai.A) / 1000 * factor;
            
            const lambda_hokyo1 = (lk_hokyo1_m * 100) / constants.gentaiHokyo1.ix_cm;
            const sigma_ca_hokyo1 = getSigmaCa(lambda_hokyo1);
            baseForces.gentaiHokyo1_Nca = (sigma_ca_hokyo1 * constants.gentaiHokyo1.A) / 1000 * 2 * factor;

            const lambda_hokyo2 = (lk_hokyo2_m * 100) / constants.gentaiHokyo2.ix_cm;
            const sigma_ca_hokyo2 = getSigmaCa(lambda_hokyo2);
            baseForces.gentaiHokyo2_Nca = (sigma_ca_hokyo2 * constants.gentaiHokyo2.A) / 1000 * 2 * factor;
            
            baseForces.shazai_Nca = constants.shazai.sigma_ca_base * constants.shazai.A * factor;
            baseForces.shazai_kmt3t_Nca = constants.shazai_kmt3t.sigma_ca_base * constants.shazai_kmt3t.A * factor;
            
            const sigma_pa = 355 * factor;
            const Rp = constants.bolt.d * constants.bolt.t_min * sigma_pa;
            baseForces.tenseiban_Nca = (constants.bolt.n * (Rp / 1000));
            
            // --- タイプ別許容軸力の計算 (最小値ルールを適用) ---
            const min_comp_E1_E2_E3 = Math.min(baseForces.gentai_Nca, baseForces.tenseiban_Nca);
            let min_comp_name_E1_E2_E3 = (min_comp_E1_E2_E3 === baseForces.gentai_Nca) ? '弦材の許容圧縮力' : '添接板の許容圧縮力';

            const min_comp_E1V_E3V = Math.min(baseForces.gentai_Nca, baseForces.gentaiHokyo1_Nca, baseForces.tenseiban_Nca);
            let min_comp_name_E1V_E3V = '';
            if (min_comp_E1V_E3V === baseForces.gentai_Nca) min_comp_name_E1V_E3V = '弦材の許容圧縮力';
            else if (min_comp_E1V_E3V === baseForces.gentaiHokyo1_Nca) min_comp_name_E1V_E3V = `弦材補強${hokyo1Label}の許容圧縮力`;
            else min_comp_name_E1V_E3V = '添接板の許容圧縮力';

            const chordTable = {};
            chordTable.E1 = { tension: baseForces.tenseiban1_NBt, compression: min_comp_E1_E2_E3 * 1, compression_base_name: min_comp_name_E1_E2_E3, compression_base_value: min_comp_E1_E2_E3 };
            chordTable.E1V = { tension: baseForces.tenseiban1_NBt * 2, compression: min_comp_E1V_E3V * 2, compression_base_name: min_comp_name_E1V_E3V, compression_base_value: min_comp_E1V_E3V };
            chordTable.E2 = { tension: baseForces.tenseiban1_NBt * 2, compression: min_comp_E1_E2_E3 * 2, compression_base_name: min_comp_name_E1_E2_E3, compression_base_value: min_comp_E1_E2_E3 };
            chordTable.E3 = { tension: baseForces.tenseiban1_NBt * 3, compression: min_comp_E1_E2_E3 * 3, compression_base_name: min_comp_name_E1_E2_E3, compression_base_value: min_comp_E1_E2_E3 };
            chordTable.E3V = { tension: baseForces.tenseiban1_NBt * 4, compression: min_comp_E1V_E3V * 4, compression_base_name: min_comp_name_E1V_E3V, compression_base_value: min_comp_E1V_E3V };

            let e3vSpecialResult = null;
            if (isSpecialE3V) {
                const tensionCandidates = [baseForces.gentai_Nta];
                const compressionCandidates = [baseForces.gentai_Nca, baseForces.tenseiban_Nca];
                
                tensionCandidates.push(useSpecialReinforcement ? baseForces.gentaiHokyo2_Nta : baseForces.gentaiHokyo1_Nta);
                compressionCandidates.push(useSpecialReinforcement ? baseForces.gentaiHokyo2_Nca : baseForces.gentaiHokyo1_Nca);
                tensionCandidates.push(useSpecialSplicePlate ? baseForces.tenseiban2_NBt : baseForces.tenseiban1_NBt);
                
                const minTension = Math.min(...tensionCandidates);
                const minCompression = Math.min(...compressionCandidates);
                
                let tensionExplanationText = '';
                if (minTension === baseForces.gentai_Nta) tensionExplanationText = '弦材の許容引張力';
                else if (minTension === baseForces.gentaiHokyo1_Nta) tensionExplanationText = `弦材補強${hokyo1Label}の許容引張力`;
                else if (minTension === baseForces.gentaiHokyo2_Nta) tensionExplanationText = '弦材補強2(特殊)の許容引張力';
                else if (minTension === baseForces.tenseiban1_NBt) tensionExplanationText = `添接板${tenseiban1Label}の許容引張力`;
                else if (minTension === baseForces.tenseiban2_NBt) tensionExplanationText = '添接板2(特殊)の許容引張力';

                let compressionExplanationText = '';
                if (minCompression === baseForces.gentai_Nca) compressionExplanationText = '弦材の許容圧縮力';
                else if (minCompression === baseForces.tenseiban_Nca) compressionExplanationText = '添接板の許容圧縮力';
                else if (minCompression === baseForces.gentaiHokyo1_Nca) compressionExplanationText = `弦材補強${hokyo1Label}の許容圧縮力`;
                else if (minCompression === baseForces.gentaiHokyo2_Nca) compressionExplanationText = '弦材補強2(特殊)の許容圧縮力';
                
                e3vSpecialResult = {
                    tension: minTension * 4, compression: minCompression * 4,
                    minTension: minTension, minCompression: minCompression,
                    tensionExplanation: tensionExplanationText, compressionExplanation: compressionExplanationText
                };
            }

            const diagonalTable = { E1: { tension: baseForces.shazai_Nta, compression: baseForces.shazai_Nca }, E2: { tension: baseForces.shazai_Nta * 2, compression: baseForces.shazai_Nca * 2 } };
            let diagonalKmt3tTable = null;
            if (useKmt3tDiagonal) {
                 diagonalKmt3tTable = { E1: { tension: baseForces.shazai_kmt3t_Nta, compression: baseForces.shazai_kmt3t_Nca }, E2: { tension: baseForces.shazai_kmt3t_Nta * 2, compression: baseForces.shazai_kmt3t_Nca * 2 } };
            }
            
            displayResults(chordTable, diagonalTable, diagonalKmt3tTable, baseForces, e3vSpecialResult);
        }
        
        function displayResults(chordTable, diagonalTable, diagonalKmt3tTable, baseForces, e3vSpecialResult) {
             const resultsContainer = document.getElementById('results-container');
             const useSpecialReinforcement = useSpecialReinforcementCheck.checked;
             const useSpecialSplicePlate = useSpecialSplicePlateCheck.checked;
             const useKmt3tDiagonal = useKmt3tDiagonalCheck.checked;
             const isSpecialE3V = useSpecialReinforcement || useSpecialSplicePlate;
             const hokyo1Label = useSpecialReinforcement ? '1(標準)' : '';
             const tenseiban1Label = useSpecialSplicePlate ? '1(標準)' : '';

            let e3vSpecialRow = '';
            if (isSpecialE3V) {
                const reinforcementPart = useSpecialReinforcement ? "2-CT-100x200x12x12" : "2-CT-100x200x8x12";
                const e3vSpecialCrossSection = `3-H-200x200x8x12 + ${reinforcementPart}`;
                e3vSpecialRow = `<tr class="bg-indigo-50"><td class="font-bold">E3V特</td><td>${e3vSpecialCrossSection}</td><td>SM490Y</td><td class="font-bold">${e3vSpecialResult.tension.toFixed(1)}</td><td class="font-bold">${e3vSpecialResult.compression.toFixed(1)}</td></tr>`;
            }

            const baseValuesLines = [
                `・弦材 許容引張力 (Nta) = ${baseForces.gentai_Nta.toFixed(1)} kN`, `・弦材 許容圧縮力 (Nca) = ${baseForces.gentai_Nca.toFixed(1)} kN`,
                `・弦材補強${hokyo1Label} 許容引張力 (Nta) = ${baseForces.gentaiHokyo1_Nta.toFixed(1)} kN`, `・弦材補強${hokyo1Label} 許容圧縮力 (Nca) = ${baseForces.gentaiHokyo1_Nca.toFixed(1)} kN`
            ];
            if (useSpecialReinforcement) {
                baseValuesLines.push(`・弦材補強2(特殊) 許容引張力 (Nta) = ${baseForces.gentaiHokyo2_Nta.toFixed(1)} kN`, `・弦材補強2(特殊) 許容圧縮力 (Nca) = ${baseForces.gentaiHokyo2_Nca.toFixed(1)} kN`);
            }
            baseValuesLines.push(`・添接板${tenseiban1Label} 許容引張力 (NBt) = ${baseForces.tenseiban1_NBt.toFixed(1)} kN`);
            if (useSpecialSplicePlate) {
                baseValuesLines.push(`・添接板2(特殊) 許容引張力 (NBt) = ${baseForces.tenseiban2_NBt.toFixed(1)} kN`);
            }
            baseValuesLines.push(`・添接板 許容圧縮力 (Nca) = ${baseForces.tenseiban_Nca.toFixed(1)} kN`);
            baseValuesLines.push(`・斜材 (標準) 許容引張力 (Nta) = ${baseForces.shazai_Nta.toFixed(1)} kN`, `・斜材 (標準) 許容圧縮力 (Nca) = ${baseForces.shazai_Nca.toFixed(1)} kN`);
            if (useKmt3tDiagonal) {
                 baseValuesLines.push(`・斜材(KMT-3T) 許容引張力 (Nta) = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} kN`, `・斜材(KMT-3T) 許容圧縮力 (Nca) = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} kN`);
            }

            const baseValuesHtml = `<div class="formula-box">${baseValuesLines.join('<br>')}</div>`;

            let chordFormulasHtml = `<div class="formula-box">
                    E1  引張: 添接板${tenseiban1Label}の許容引張力×1 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 1 = ${chordTable.E1.tension.toFixed(1)} kN<br>
                    E1  圧縮: ${chordTable.E1.compression_base_name}×1 = ${chordTable.E1.compression_base_value.toFixed(1)} × 1 = ${chordTable.E1.compression.toFixed(1)} kN<br><br>
                    E1V 引張: 添接板${tenseiban1Label}の許容引張力×2 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 2 = ${chordTable.E1V.tension.toFixed(1)} kN<br>
                    E1V 圧縮: ${chordTable.E1V.compression_base_name}×2 = ${chordTable.E1V.compression_base_value.toFixed(1)} × 2 = ${chordTable.E1V.compression.toFixed(1)} kN<br><br>
                    E2  引張: 添接板${tenseiban1Label}の許容引張力×2 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 2 = ${chordTable.E2.tension.toFixed(1)} kN<br>
                    E2  圧縮: ${chordTable.E2.compression_base_name}×2 = ${chordTable.E2.compression_base_value.toFixed(1)} × 2 = ${chordTable.E2.compression.toFixed(1)} kN<br><br>
                    E3  引張: 添接板${tenseiban1Label}の許容引張力×3 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 3 = ${chordTable.E3.tension.toFixed(1)} kN<br>
                    E3  圧縮: ${chordTable.E3.compression_base_name}×3 = ${chordTable.E3.compression_base_value.toFixed(1)} × 3 = ${chordTable.E3.compression.toFixed(1)} kN<br><br>
                    E3V 引張: 添接板${tenseiban1Label}の許容引張力×4 = ${baseForces.tenseiban1_NBt.toFixed(1)} × 4 = ${chordTable.E3V.tension.toFixed(1)} kN<br>
                    E3V 圧縮: ${chordTable.E3V.compression_base_name}×4 = ${chordTable.E3V.compression_base_value.toFixed(1)} × 4 = ${chordTable.E3V.compression.toFixed(1)} kN
                    ${isSpecialE3V ? `<br><br><hr class="my-2 border-gray-400"><br>
                        <b>E3V特 引張:</b> ${e3vSpecialResult.tensionExplanation}×4 = ${e3vSpecialResult.minTension.toFixed(1)} × 4 = <b>${e3vSpecialResult.tension.toFixed(1)} kN</b><br>
                        <b>E3V特 圧縮:</b> ${e3vSpecialResult.compressionExplanation}×4 = ${e3vSpecialResult.minCompression.toFixed(1)} × 4 = <b>${e3vSpecialResult.compression.toFixed(1)} kN</b>` : ''}
                </div>`;

            let kmt3tRows = '';
            if(useKmt3tDiagonal) {
                kmt3tRows = `<tr class="bg-green-50"><td>E1 (KMT-3T)</td><td>1-H-200x150x9x12</td><td>SM490Y</td><td>${diagonalKmt3tTable.E1.tension.toFixed(1)}</td><td>${diagonalKmt3tTable.E1.compression.toFixed(1)}</td></tr>
                    <tr class="bg-green-50"><td>E2 (KMT-3T)</td><td>2-H-200x150x9x12</td><td>SM490Y</td><td>${diagonalKmt3tTable.E2.tension.toFixed(1)}</td><td>${diagonalKmt3tTable.E2.compression.toFixed(1)}</td></tr>`;
            }

            let shazaiFormulaHtml = `<div class="formula-box">
                    E1  引張: 斜材(標準)の許容引張力×1 = ${baseForces.shazai_Nta.toFixed(1)} × 1 = ${diagonalTable.E1.tension.toFixed(1)} kN<br>
                    E1  圧縮: 斜材(標準)の許容圧縮力×1 = ${baseForces.shazai_Nca.toFixed(1)} × 1 = ${diagonalTable.E1.compression.toFixed(1)} kN<br><br>
                    E2  引張: 斜材(標準)の許容引張力×2 = ${baseForces.shazai_Nta.toFixed(1)} × 2 = ${diagonalTable.E2.tension.toFixed(1)} kN<br>
                    E2  圧縮: 斜材(標準)の許容圧縮力×2 = ${baseForces.shazai_Nca.toFixed(1)} × 2 = ${diagonalTable.E2.compression.toFixed(1)} kN
                    ${useKmt3tDiagonal ? `<br><br><hr class="my-2 border-gray-400"><br>
                        <b>E1(KMT-3T) 引張:</b> 斜材(KMT-3T)の許容引張力×1 = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} × 1 = <b>${diagonalKmt3tTable.E1.tension.toFixed(1)} kN</b><br>
                        <b>E1(KMT-3T) 圧縮:</b> 斜材(KMT-3T)の許容圧縮力×1 = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} × 1 = <b>${diagonalKmt3tTable.E1.compression.toFixed(1)} kN</b><br><br>
                        <b>E2(KMT-3T) 引張:</b> 斜材(KMT-3T)の許容引張力×2 = ${baseForces.shazai_kmt3t_Nta.toFixed(1)} × 2 = <b>${diagonalKmt3tTable.E2.tension.toFixed(1)} kN</b><br>
                        <b>E2(KMT-3T) 圧縮:</b> 斜材(KMT-3T)の許容圧縮力×2 = ${baseForces.shazai_kmt3t_Nca.toFixed(1)} × 2 = <b>${diagonalKmt3tTable.E2.compression.toFixed(1)} kN</b>` : ''}
