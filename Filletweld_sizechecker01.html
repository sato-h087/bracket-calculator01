<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隅肉溶接サイズチェッカー</title>
    <!-- Tailwind CSSを読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Interフォントの読み込み */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        /* 数式用のフォント調整 */
        .math-font {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: 700;
        }
        .math-var {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-style: italic;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 sm:p-8 rounded-lg shadow-xl w-full max-w-lg">
        <h1 class="text-2xl sm:text-3xl font-bold text-center text-gray-800 mb-6">
            隅肉溶接サイズチェッカー
        </h1>

        <!-- 入力フォーム -->
        <div class="space-y-4">
            <div>
                <label for="t1" class="block text-sm font-medium text-gray-700 mb-1">
                    薄い方の母材の厚さ <span class="math-var">t1</span> (mm)
                </label>
                <input type="number" id="t1" min="0" step="0.1"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-lg"
                       placeholder="例: 10">
            </div>
            <div>
                <label for="t2" class="block text-sm font-medium text-gray-700 mb-1">
                    厚い方の母材の厚さ <span class="math-var">t2</span> (mm)
                </label>
                <input type="number" id="t2" min="0" step="0.1"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-lg"
                       placeholder="例: 12">
            </div>
            <div>
                <label for="S" class="block text-sm font-medium text-gray-700 mb-1">
                    隅肉溶接のサイズ <span class="math-var">S</span> (mm)
                </label>
                <input type="number" id="S" min="0" step="0.1"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-lg"
                       placeholder="t1とt2入力で自動計算">
            </div>
        </div>

        <!-- 判定条件 -->
        <div class="mt-6 border-2 border-blue-200 bg-blue-50 rounded-lg p-4">
            <h2 class="text-lg font-semibold text-blue-800 mb-3 text-center">判定条件</h2>
            <ul class="space-y-2 text-center text-gray-700">
                <li class="text-lg"><span class="math-var">S</span> ≧ 6 mm</li>
                <li class="text-lg"><span class="math-var">t1</span> ＞ <span class="math-var">S</span></li>
                <li class="text-lg"><span class="math-var">S</span> ≧ √ (2 × <span class="math-var">t2</span>)</li>
            </ul>
            <p class="text-xs text-center text-gray-500 mt-3">
                ※「道路橋示方書・同解説　鋼橋編」の隅肉溶接サイズ規定より
            </p>
        </div>

        <!-- メッセージ表示エリア -->
        <div id="messageArea" class="mt-6 space-y-2">
            <!-- t1 > t2 警告 -->
            <div id="t1_gt_t2_warning" class="hidden p-3 rounded-md bg-yellow-100 border border-yellow-300 text-yellow-800 text-center font-medium">
                <!-- メッセージはJSで挿入 -->
            </div>
            <!-- 計算不可メッセージ -->
            <div id="calculation_error" class="hidden p-3 rounded-md bg-red-100 border border-red-300 text-red-800 text-center font-medium">
                <!-- メッセージはJSで挿入 -->
            </div>
            <!-- 特別ケース警告 -->
            <div id="special_case_warning" class="hidden p-3 rounded-md bg-blue-100 border border-blue-300 text-blue-800 text-left text-sm">
                ※この場合は、一般にS＜t1として良いですが、溶接部に割れが生じやすく
                なるので、特に溶接時の予熱については十分検討する必要がある。
            </div>
            <!-- 判定結果メッセージ -->
            <div id="validation_result" class="hidden p-4 rounded-md text-center text-lg font-semibold">
                <!-- メッセージとスタイルはJSで挿入 -->
            </div>
        </div>

    </div>

    <script>
        // DOM要素の取得
        const t1Input = document.getElementById('t1');
        const t2Input = document.getElementById('t2');
        const sInput = document.getElementById('S');
        
        const t1GtT2Warning = document.getElementById('t1_gt_t2_warning');
        const calcError = document.getElementById('calculation_error');
        const specialCaseWarning = document.getElementById('special_case_warning');
        const validationResult = document.getElementById('validation_result');

        // t1 または t2 が変更されたときの処理
        function handleT1T2Change() {
            const t1 = parseFloat(t1Input.value);
            const t2 = parseFloat(t2Input.value);

            // メッセージを一旦クリア
            clearMessages();

            // t1 > t2 警告チェック
            if (t1 > 0 && t2 > 0 && t1 > t2) {
                t1GtT2Warning.textContent = '警告: t1 (薄い方) が t2 (厚い方) より大きくなっています。';
                t1GtT2Warning.classList.remove('hidden');
            }

            // t1 と t2 の両方が有効な数値の場合、Sを自動計算
            if (t1 > 0 && t2 > 0) {
                // Sの最小条件を計算
                const sMinRequiredFromT2 = Math.sqrt(2 * t2);
                const sMinRequired = Math.max(6, sMinRequiredFromT2);

                // ユーザー指摘のケース: t1 ≦ √ (2 × t2)
                if (t1 <= sMinRequiredFromT2) {
                    sInput.value = ''; // Sは自動計算しない
                    
                    // 「計算不可」メッセージを表示
                    calcError.textContent = `計算不可: 条件 (t1 > S かつ S ≧ ${sMinRequiredFromT2.toFixed(2)}) を満たす S が存在しません。(t1が小さすぎます)`;
                    calcError.classList.remove('hidden');
                    
                    // 「特別ケース」メッセージも表示
                    specialCaseWarning.classList.remove('hidden'); // 新しいメッセージを表示
                
                // 通常の計算可能ケース: t1 > S (Sの最小値)
                } else if (t1 > sMinRequired) {
                    // 条件を満たす最小のS (小数点第3位切り上げ)
                    const sMinCalculated = Math.ceil(sMinRequired * 100) / 100;
                    
                    sInput.value = sMinCalculated;
                    
                    // 自動計算された値で判定を実行（必ずOKになるはず）
                    runValidation();

                // その他の計算不可ケース (例: t1が6以下)
                } else {
                    // 条件を満たすSが存在しない
                    sInput.value = '';
                    calcError.textContent = `計算不可: 条件 (t1 > S かつ S ≧ ${sMinRequired.toFixed(2)}) を満たす S が存在しません。(t1が小さすぎます)`;
                    calcError.classList.remove('hidden');
                }
            } else {
                 // t1かt2が入力されていない場合、S入力欄と判定をクリア
                 sInput.value = '';
                 clearMessages(false); // t1>t2警告は残す場合があるため、falseを渡す
            }
        }

        // S が変更されたときの処理
        function handleSChange() {
            // Sが手動で変更されたら、計算不可メッセージは消す
            calcError.classList.add('hidden');
            specialCaseWarning.classList.add('hidden');
            
            // t1 > t2 警告はSの変更に関わらずチェック
            const t1 = parseFloat(t1Input.value);
            const t2 = parseFloat(t2Input.value);
            if (t1 > 0 && t2 > 0 && t1 > t2) {
                t1GtT2Warning.textContent = '警告: t1 (薄い方) が t2 (厚い方) より大きくなっています。';
                t1GtT2Warning.classList.remove('hidden');
            } else {
                t1GtT2Warning.classList.add('hidden');
            }

            // 判定ロジックの実行
            runValidation();
        }
        
        // 判定ロジック
        function runValidation() {
            const t1 = parseFloat(t1Input.value);
            const t2 = parseFloat(t2Input.value);
            const S = parseFloat(sInput.value);

            // 3つの入力がすべて有効な数値の場合のみ判定
            if (t1 > 0 && t2 > 0 && S > 0) {
                const sMinRequiredFromT2 = Math.sqrt(2 * t2);

                const cond1 = (S >= 6);
                const cond2 = (t1 > S);
                const cond3 = (S >= sMinRequiredFromT2);

                if (cond1 && cond2 && cond3) {
                    // OKの場合
                    validationResult.textContent = 'OK: 条件を満たしています。';
                    validationResult.className = 'p-4 rounded-md text-center text-lg font-semibold bg-green-100 border border-green-300 text-green-800';
                    validationResult.classList.remove('hidden');
                } else {
                    // NGの場合
                    let errorDetails = [];
                    if (!cond1) {
                        errorDetails.push('S < 6 mm');
                    }
                    if (!cond2) {
                        errorDetails.push('t1 ≦ S');
                    }
                    if (!cond3) {
                        errorDetails.push(`S < √ (2 × t2) (S < ${sMinRequiredFromT2.toFixed(2)})`);
                    }
                    
                    validationResult.innerHTML = `NG: 条件を満たしていません。<br><span class="text-sm font-normal">(${errorDetails.join(', ')})</span>`;
                    validationResult.className = 'p-4 rounded-md text-center text-lg font-semibold bg-red-100 border border-red-300 text-red-800';
                    validationResult.classList.remove('hidden');
                }
            } else {
                // Sが空欄など、有効な判定ができない場合は結果を隠す
                validationResult.classList.add('hidden');
            }
        }

        // メッセージクリア用ヘルパー
        function clearMessages(clearT1T2Warning = true) {
            if (clearT1T2Warning) {
                t1GtT2Warning.classList.add('hidden');
            }
            calcError.classList.add('hidden');
            specialCaseWarning.classList.add('hidden');
            validationResult.classList.add('hidden');
        }

        // イベントリスナーの設定
        t1Input.addEventListener('input', handleT1T2Change);
        t2Input.addEventListener('input', handleT1T2Change);
        sInput.addEventListener('input', handleSChange);

    </script>
</body>
</html>
